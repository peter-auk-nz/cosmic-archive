<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Archive - Periodic Table of Elements</title>
    <link rel="stylesheet" href="style-test.css">
</head>
<body>
    <main>
    
    <!-- Element Search Box -->
    <div class="search-container">
        <input 
            type="text" 
            id="element-search" 
         placeholder="Search for an element (e.g., Oxygen or O)">
    <button id="search-button">Search</button>
    </div>
    
    <!-- Period Filter Buttons -->
    <div class="filter-container">
        <button class="filter-btn active" data-period="all">Show All</button>
        <button class="filter-btn" data-period="1">Period 1</button>
        <button class="filter-btn" data-period="2">Period 2</button>
        <button class="filter-btn" data-period="3">Period 3</button>
        <button class="filter-btn" data-period="4">Period 4</button>
        <button class="filter-btn" data-period="5">Period 5</button>
        <button class="filter-btn" data-period="6">Period 6</button>
        <button class="filter-btn" data-period="7">Period 7</button>
    </div>

    <section class="period">
        <h2>Period 1</h2>
        <div class="element-list" id="period-1"></div>
    </section>
    
    <section class="period">
        <h2>Period 2</h2>
        <div class="element-list" id="period-2"></div>
    </section>
    
    <section class="period">
        <h2>Period 3</h2>
        <div class="element-list" id="period-3"></div>
    </section>

    <section class="period">
        <h2>Period 4</h2>
        <div class="element-list" id="period-4"></div>
    </section>

    <section class="period">
        <h2>Period 5</h2>
        <div class="element-list" id="period-5"></div>
    </section>

    <section class="period">
        <h2>Period 6</h2>
        <div class="element-list" id="period-6"></div>
    </section>

    <section class="period">
        <h2>Period 7</h2>
        <div class="element-list" id="period-7"></div>
    </section>

</main>

<script src="script.js"></script>
<script src="index.js"></script>


</body>
</html>
