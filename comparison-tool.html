<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Element Comparison - Cosmic Archive</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
            font-size: 2.5em;
            color: #00d4ff;
        }

        .selection-area {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 40px;
            text-align: center;
        }

        .selector-group {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .selector {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        label {
            font-size: 1.2em;
            color: #00d4ff;
        }

        select {
            padding: 12px 20px;
            font-size: 1em;
            border: 2px solid #00d4ff;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            cursor: pointer;
            min-width: 250px;
        }

        select option {
            background: #1a1a2e;
            color: #fff;
        }

        .compare-btn {
            padding: 15px 40px;
            font-size: 1.2em;
            background: #00d4ff;
            color: #1a1a2e;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .compare-btn:hover {
            background: #00b8e6;
            transform: scale(1.05);
        }

        .compare-btn:active {
            transform: scale(0.95);
        }

        .comparison-area {
            display: none;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .comparison-area.active {
            display: flex;
        }

        .element-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            min-width: 350px;
            border: 2px solid #00d4ff;
        }

        .element-card h2 {
            text-align: center;
            font-size: 3em;
            color: #00d4ff;
            margin-bottom: 10px;
        }

        .element-card h3 {
            text-align: center;
            font-size: 1.5em;
            margin-bottom: 30px;
            color: #fff;
        }

        .property {
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 5px;
        }

        .property-label {
            color: #00d4ff;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .property-value {
            font-size: 1.1em;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #00d4ff;
            text-decoration: none;
            font-size: 1.1em;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← Back to Home</a>
        
        <h1>⚖️ Element Comparison Tool</h1>

        <div class="selection-area">
            <div class="selector-group">
                <div class="selector">
                    <label for="element1">First Element:</label>
                    <select id="element1">
                        <option value="">-- Select Element --</option>
                    </select>
                </div>

                <div class="selector">
                    <label for="element2">Second Element:</label>
                    <select id="element2">
                        <option value="">-- Select Element --</option>
                    </select>
                </div>
            </div>

            <button class="compare-btn" onclick="compareElements()">Compare Elements</button>
        </div>

        <div class="comparison-area" id="comparisonArea">
            <div class="element-card" id="card1"></div>
            <div class="element-card" id="card2"></div>
        </div>
    </div>

    <script>
        let elementsData = [];

        // Load elements data
        fetch('elements-data.json')
            .then(response => response.json())
            .then(data => {
                elementsData = data;
                populateDropdowns();
            })
            .catch(error => {
                console.error('Error loading elements:', error);
                alert('Error loading elements data. Please check that elements-data.json exists.');
            });

        function populateDropdowns() {
            const select1 = document.getElementById('element1');
            const select2 = document.getElementById('element2');

            elementsData.forEach(element => {
                const option1 = document.createElement('option');
                option1.value = element.atomicNumber;
                option1.textContent = `${element.atomicNumber}. ${element.name} (${element.symbol})`;
                select1.appendChild(option1);

                const option2 = document.createElement('option');
                option2.value = element.atomicNumber;
                option2.textContent = `${element.atomicNumber}. ${element.name} (${element.symbol})`;
                select2.appendChild(option2);
            });
        }

        function compareElements() {
            const num1 = document.getElementById('element1').value;
            const num2 = document.getElementById('element2').value;

            if (!num1 || !num2) {
                alert('Please select both elements to compare!');
                return;
            }

            if (num1 === num2) {
                alert('Please select two different elements!');
                return;
            }

            const element1 = elementsData.find(e => e.atomicNumber == num1);
            const element2 = elementsData.find(e => e.atomicNumber == num2);

            displayComparison(element1, element2);
        }

        function displayComparison(el1, el2) {
            document.getElementById('card1').innerHTML = createElementCard(el1);
            document.getElementById('card2').innerHTML = createElementCard(el2);
            document.getElementById('comparisonArea').classList.add('active');
        }

        function createElementCard(element) {
            return `
                <h2>${element.symbol}</h2>
                <h3>${element.name}</h3>
                
                <div class="property">
                    <div class="property-label">Atomic Number</div>
                    <div class="property-value">${element.atomicNumber}</div>
                </div>

                <div class="property">
                    <div class="property-label">Atomic Weight</div>
                    <div class="property-value">${element.atomicWeight}</div>
                </div>

                <div class="property">
                    <div class="property-label">Melting Point</div>
                    <div class="property-value">${element.meltingPoint}°C</div>
                </div>

                <div class="property">
                    <div class="property-label">Boiling Point</div>
                    <div class="property-value">${element.boilingPoint}°C</div>
                </div>

                <div class="property">
                    <div class="property-label">State at Room Temperature</div>
                    <div class="property-value">${element.stateAtroomTemperature}</div>
                </div>

                <div class="property">
                    <div class="property-label">Discovered</div>
                    <div class="property-value">${element.discoveryDate}</div>
                </div>

                <div class="property">
                    <div class="property-label">Electron Configuration</div>
                    <div class="property-value">${element.electronConfig.replace(/,/g, ',<br>')}</div>
                </div>
            `;
                
        }
    </script>
</body>
</html>
