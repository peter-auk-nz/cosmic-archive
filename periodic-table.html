<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Periodic Table - Cosmic Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
      color: #fff;
      padding: 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      font-size: 2.5rem;
      margin-bottom: 10px;
      background: linear-gradient(45deg, #00d4ff, #9d4edd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      text-align: center;
      color: #888;
      margin-bottom: 40px;
      font-size: 1rem;
    }

    .periodic-table {
      display: grid;
      grid-template-columns: repeat(18, 1fr);
      gap: 4px;
      margin-bottom: 40px;
    }

    .element {
      aspect-ratio: 1;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 2px solid transparent;
      position: relative;
    }

    .element:hover {
      transform: scale(1.1);
      z-index: 10;
      border-color: #fff;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
    }

    .atomic-number {
      font-size: 0.7rem;
      opacity: 0.8;
      position: absolute;
      top: 4px;
      left: 6px;
    }

    .symbol {
      font-size: 1.5rem;
      font-weight: 700;
    }

    .name {
      font-size: 0.6rem;
      opacity: 0.9;
      margin-top: 2px;
    }

    .gap {
      background: transparent;
      cursor: default;
    }

    .gap:hover {
      transform: none;
      border-color: transparent;
      box-shadow: none;
    }

    /* Period colors - from your existing site */
    .period-1 { background: #E3F2FD; color: #0D47A1; }
    .period-2 { background: #FFF9C4; color: #F57F17; }
    .period-3 { background: #F8BBD0; color: #880E4F; }
    .period-4 { background: #C8E6C9; color: #1B5E20; }
    .period-5 { background: #FFE0B2; color: #E65100; }
    .period-6 { background: #D1C4E9; color: #4A148C; }
    .period-7 { background: #B2EBF2; color: #006064; }

    .legend {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 40px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .legend-box {
      width: 30px;
      height: 30px;
      border-radius: 4px;
    }

    @media (max-width: 1200px) {
      .periodic-table {
        gap: 2px;
      }
      
      .symbol {
        font-size: 1.2rem;
      }
      
      .name {
        font-size: 0.5rem;
      }
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 1.8rem;
      }
      
      .periodic-table {
        gap: 1px;
      }
      
      .symbol {
        font-size: 0.9rem;
      }
      
      .name {
        display: none;
      }
      
      .atomic-number {
        font-size: 0.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Interactive Periodic Table</h1>
    <p class="subtitle">Click any element to view details</p>
    
    <div class="periodic-table" id="periodicTable">
      <!-- Elements will be generated by JavaScript -->
    </div>

    <div class="legend">
      <div class="legend-item">
        <div class="legend-box period-1"></div>
        <span>Period 1</span>
      </div>
      <div class="legend-item">
        <div class="legend-box period-2"></div>
        <span>Period 2</span>
      </div>
      <div class="legend-item">
        <div class="legend-box period-3"></div>
        <span>Period 3</span>
      </div>
      <div class="legend-item">
        <div class="legend-box period-4"></div>
        <span>Period 4</span>
      </div>
      <div class="legend-item">
        <div class="legend-box period-5"></div>
        <span>Period 5</span>
      </div>
      <div class="legend-item">
        <div class="legend-box period-6"></div>
        <span>Period 6</span>
      </div>
      <div class="legend-item">
        <div class="legend-box period-7"></div>
        <span>Period 7</span>
      </div>
    </div>
  </div>

  <script src="periodic-table.js"></script>
</body>
</html>
