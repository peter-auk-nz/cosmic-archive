<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atom Visualizer - Cosmic Archive</title>
    <link rel="stylesheet" href="atom-viz.css">
</head>
<body>
    <div class="container">
        <h1>⚛️ Atom Visualizer</h1>
        
        <div class="controls">
            <label for="elementSelect">Choose Element:</label>
        <select id="elementSelect">
                
        <option value="1">1 - Hydrogen (H)</option>
        <option value="2">2 - Helium (He)</option>
        <option value="3">3 - Lithium (Li)</option>
        <option value="4">4 - Beryllium (Be)</option>
        <option value="5">5 - Boron (B)</option>
        <option value="6">6 - Carbon (C)</option>
        <option value="7">7 - Nitrogen (N)</option>
        <option value="8">8 - Oxygen (O)</option>
        <option value="9">9 - Fluorine (F)</option>
        <option value="10">10 - Neon (Ne)</option>
        <option value="11">11 - Sodium (Na)</option>
        <option value="12">12 - Magnesium (Mg)</option>
        <option value="13">13 - Aluminum (Al)</option>
        <option value="14">14 - Silicon (Si)</option>
        <option value="15">15 - Phosphorus (P)</option>
        <option value="16">16 - Sulfur (S)</option>
        <option value="17">17 - Chlorine (Cl)</option>
        <option value="18">18 - Argon (Ar)</option>
        <option value="19">19 - Potassium (K)</option>
        <option value="20">20 - Calcium (Ca)</option>
        </select>
           
    </div>

        <!-- Canvas for drawing the atom -->
        <canvas id="atomCanvas" width="600" height="600"></canvas>
        
        <div id="info">
            <p>Select an element to visualize its atomic structure</p>
        </div>
    </div>

    <script src="atom-viz.js"></script>
</body>
</html>
